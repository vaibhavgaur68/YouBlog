<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouBlogs — Explore</title>
  <meta name="description" content="Explore trending posts, topics, and writers on YouBlogs. Find stories that match your interests." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://youblogs.pages.dev/explore.html" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Explore-specific styles ── */

    .explore-header {
      padding: var(--sp-4) var(--sp-4) var(--sp-3);
      position: sticky;
      top: var(--nav-h);
      background: rgba(10,10,11,0.95);
      backdrop-filter: blur(20px);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-4) var(--sp-4) var(--sp-2);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text);
    }

    .section-link {
      font-size: var(--text-xs);
      color: var(--amber);
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
    }

    /* ── Trending topics grid ── */
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-4) var(--sp-4);
    }

    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-4);
      cursor: pointer;
      transition: border-color var(--t-fast), background var(--t-fast), transform var(--t-spring);
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      position: relative;
      overflow: hidden;
    }

    .topic-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      opacity: 0.06;
      transform: translate(20%, 20%);
    }

    .topic-card:active { transform: scale(0.97); }

    .topic-card__icon {
      width: 36px;
      height: 36px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topic-card__icon svg { width: 18px; height: 18px; }

    .topic-card__name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text);
    }

    .topic-card__count {
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    /* Topic color variants */
    .topic--tech    { border-color: rgba(99,179,237,0.2); }
    .topic--tech .topic-card__icon    { background: rgba(99,179,237,0.12); color: #63b3ed; }
    .topic--tech::before              { background: #63b3ed; }

    .topic--science { border-color: rgba(154,124,240,0.2); }
    .topic--science .topic-card__icon { background: rgba(154,124,240,0.12); color: #9a7cf0; }
    .topic--science::before           { background: #9a7cf0; }

    .topic--design  { border-color: rgba(246,135,179,0.2); }
    .topic--design .topic-card__icon  { background: rgba(246,135,179,0.12); color: #f687b3; }
    .topic--design::before            { background: #f687b3; }

    .topic--culture { border-color: rgba(232,160,32,0.2); }
    .topic--culture .topic-card__icon { background: var(--amber-dim); color: var(--amber); }
    .topic--culture::before           { background: var(--amber); }

    .topic--health  { border-color: rgba(62,207,142,0.2); }
    .topic--health .topic-card__icon  { background: rgba(62,207,142,0.1); color: var(--green); }
    .topic--health::before            { background: var(--green); }

    .topic--finance { border-color: rgba(252,211,77,0.2); }
    .topic--finance .topic-card__icon { background: rgba(252,211,77,0.1); color: #fcd34d; }
    .topic--finance::before           { background: #fcd34d; }

    .topic--travel  { border-color: rgba(103,211,234,0.2); }
    .topic--travel .topic-card__icon  { background: rgba(103,211,234,0.1); color: #67d3ea; }
    .topic--travel::before            { background: #67d3ea; }

    .topic--food    { border-color: rgba(252,129,74,0.2); }
    .topic--food .topic-card__icon    { background: rgba(252,129,74,0.1); color: #fc814a; }
    .topic--food::before              { background: #fc814a; }

    /* ── Writers row (horizontal scroll) ── */
    .writers-row {
      display: flex;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-4) var(--sp-4);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .writers-row::-webkit-scrollbar { display: none; }

    .writer-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-2);
      flex-shrink: 0;
      cursor: pointer;
      width: 72px;
    }

    .writer-chip__avatar {
      position: relative;
    }

    .writer-chip__avatar .avatar {
      border: 2px solid var(--border);
      transition: border-color var(--t-fast), transform var(--t-spring);
    }

    .writer-chip:active .avatar {
      transform: scale(0.92);
      border-color: var(--amber);
    }

    .writer-chip__name {
      font-size: 11px;
      color: var(--text-sub);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      font-weight: 500;
    }

    .writer-chip__follow {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      background: var(--amber);
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .writer-chip__follow svg {
      width: 10px;
      height: 10px;
      color: var(--ink-0);
    }

    /* ── Search results ── */
    .search-results {
      display: none;
    }

    .search-results--show {
      display: block;
    }

    .search-section {
      display: none;
    }

    .search-section--show {
      display: block;
    }

    /* Search result tabs */
    .result-tabs {
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--border);
    }

    .result-tab {
      height: 30px;
      padding: 0 var(--sp-3);
      border-radius: var(--r-full);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      transition: color var(--t-fast), background var(--t-fast);
    }

    .result-tab--active {
      background: var(--amber-dim);
      color: var(--amber);
    }

    /* Writer list item */
    .writer-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--t-fast);
    }

    .writer-item:hover { background: var(--ink-2); }
    .writer-item:last-child { border-bottom: none; }

    .writer-item__info {
      flex: 1;
      min-width: 0;
    }

    .writer-item__name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .writer-item__meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 1px;
    }

    .writer-item__bio {
      font-size: var(--text-xs);
      color: var(--text-sub);
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Recent searches */
    .recent-search-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      cursor: pointer;
      transition: background var(--t-fast);
    }

    .recent-search-item:hover { background: var(--ink-2); }

    .recent-search-item__icon {
      width: 34px;
      height: 34px;
      border-radius: var(--r-full);
      background: var(--ink-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .recent-search-item__icon svg { width: 15px; height: 15px; }

    .recent-search-item__text {
      flex: 1;
      font-size: var(--text-sm);
      color: var(--text);
    }

    .recent-search-item__remove {
      color: var(--text-muted);
      padding: var(--sp-1);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
    }

    .recent-search-item__remove svg { width: 14px; height: 14px; }

    /* No results */
    .no-results {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-10) var(--sp-6);
      text-align: center;
    }

    .no-results svg { width: 40px; height: 40px; color: var(--ink-5); }
    .no-results__title { font-family: var(--font-display); font-size: var(--text-xl); color: var(--text); }
    .no-results__sub   { font-size: var(--text-sm); color: var(--text-sub); }

    /* Trending tag pills */
    .trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-4) var(--sp-4);
    }

    .trending-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 30px;
      padding: 0 var(--sp-3);
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
    }

    .trending-tag:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-dim);
    }

    .trending-tag svg { width: 12px; height: 12px; }

    /* Inline loader */
    .inline-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
    }

    .inline-loader svg {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
    }

    /* Search input clear btn */
    .search-clear {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
      transition: color var(--t-fast), background var(--t-fast);
      display: none;
    }

    .search-clear svg { width: 16px; height: 16px; }
    .search-clear:hover { color: var(--text); background: var(--ink-4); }
    .search-clear--show { display: flex; }
  </style>
  <!-- Page transition: prevents FOUC flash between pages -->
  <script>
    document.documentElement.classList.add("ready");
    document.addEventListener("click", function(e) {
      var a = e.target.closest("a[href]");
      if (!a) return;
      var href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("javascript") || href.startsWith("http") || a.target === "_blank") return;
      e.preventDefault();
      document.body.classList.add("page-leaving");
      setTimeout(function() { window.location.href = href; }, 120);
    });
  </script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     TOP NAV
══════════════════════════════════════════════════════════ -->
<nav class="top-nav">
  <div class="top-nav__wordmark">Explore</div>
</nav>

<!-- ══════════════════════════════════════════════════════════
     PAGE
══════════════════════════════════════════════════════════ -->
<div class="page" id="page">

  <!-- ── Sticky search bar ── -->
  <div class="explore-header">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        placeholder="Search posts, writers…"
        autocomplete="off"
        autocapitalize="none"
        spellcheck="false"
        oninput="onSearchInput(this.value)"
        onfocus="onSearchFocus()"
      />
      <button class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       DISCOVERY SECTION (shown when not searching)
  ══════════════════════════════════════════════════════════ -->
  <div id="discover-section">

    <!-- Writers to follow -->
    <div class="section-header">
      <div class="section-title">Writers to follow</div>
      <button class="section-link" onclick="showAllWriters()">See all</button>
    </div>

    <div class="writers-row" id="writers-row">
      <!-- Skeleton chips -->
      <div style="display:flex;gap:12px;padding:0 0 4px">
        ${[...Array(5)].map(() => `
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:72px">
            <div class="skeleton" style="width:52px;height:52px;border-radius:50%"></div>
            <div class="skeleton" style="width:48px;height:10px;border-radius:4px"></div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Trending topics -->
    <div class="section-header">
      <div class="section-title">Browse topics</div>
    </div>

    <div class="topics-grid">
      <div class="topic-card topic--tech" onclick="searchTag('technology')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="topic-card__name">Technology</div>
        <div class="topic-card__count" id="count-technology">— posts</div>
      </div>

      <div class="topic-card topic--science" onclick="searchTag('science')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
          </svg>
        </div>
        <div class="topic-card__name">Science</div>
        <div class="topic-card__count" id="count-science">— posts</div>
      </div>

      <div class="topic-card topic--design" onclick="searchTag('design')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="17" r="2"/><circle cx="6" cy="17" r="2"/>
            <path d="M10.88 10.34 6.72 15.1"/><path d="M14.5 8.5 19 15"/>
          </svg>
        </div>
        <div class="topic-card__name">Design</div>
        <div class="topic-card__count" id="count-design">— posts</div>
      </div>

      <div class="topic-card topic--culture" onclick="searchTag('culture')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="topic-card__name">Culture</div>
        <div class="topic-card__count" id="count-culture">— posts</div>
      </div>

      <div class="topic-card topic--health" onclick="searchTag('health')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="topic-card__name">Health</div>
        <div class="topic-card__count" id="count-health">— posts</div>
      </div>

      <div class="topic-card topic--finance" onclick="searchTag('finance')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="topic-card__name">Finance</div>
        <div class="topic-card__count" id="count-finance">— posts</div>
      </div>

      <div class="topic-card topic--travel" onclick="searchTag('travel')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="topic-card__name">Travel</div>
        <div class="topic-card__count" id="count-travel">— posts</div>
      </div>

      <div class="topic-card topic--food" onclick="searchTag('food')">
        <div class="topic-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
        </div>
        <div class="topic-card__name">Food</div>
        <div class="topic-card__count" id="count-food">— posts</div>
      </div>
    </div>

    <!-- Trending posts -->
    <div class="section-header">
      <div class="section-title">Trending now</div>
    </div>
    <div class="feed" id="trending-feed" style="padding-top:0">
      <div class="inline-loader">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      </div>
    </div>

  </div><!-- /discover-section -->

  <!-- ══════════════════════════════════════════════════════
       SEARCH RESULTS SECTION
  ══════════════════════════════════════════════════════════ -->
  <div id="search-section" class="search-section">

    <!-- Recent searches (shown before typing) -->
    <div id="recent-searches-panel">
      <div class="section-header">
        <div class="section-title">Recent</div>
        <button class="section-link" onclick="clearAllRecent()">Clear all</button>
      </div>
      <div id="recent-list"></div>
    </div>

    <!-- Active results -->
    <div id="results-panel" style="display:none">
      <div class="result-tabs">
        <button class="result-tab result-tab--active" id="rtab-posts"   onclick="switchResultTab('posts')">Posts</button>
        <button class="result-tab"                    id="rtab-writers" onclick="switchResultTab('writers')">Writers</button>
      </div>

      <div id="results-posts">
        <div class="inline-loader" id="posts-loader">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </div>
        <div id="posts-list" class="feed" style="padding-top:var(--sp-2)"></div>
      </div>

      <div id="results-writers" style="display:none">
        <div class="inline-loader" id="writers-loader">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </div>
        <div id="writers-list"></div>
      </div>
    </div>

  </div><!-- /search-section -->

</div><!-- /page -->

<!-- ══════════════════════════════════════════════════════════
     BOTTOM NAV
══════════════════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <div class="bottom-nav__items">
    <a href="index.html" class="bottom-nav__item" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
    <a href="explore.html" class="bottom-nav__item bottom-nav__item--active" aria-label="Explore">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </a>
    <a href="write.html" class="bottom-nav__item" aria-label="Write">
      <div class="bottom-nav__fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </a>
    <a href="profile.html" class="bottom-nav__item" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
  </div>
</nav>

<script type="module">
import {
  getUser, getFeed, searchBlogs, getProfile,
  followUser, unfollowUser, isFollowing,
  getMyLikedIds, getMyBookmarkedIds,
  likeBlog, unlikeBlog, toggleBookmark,
  formatCount, timeAgo, initials, debounce, toast, navigate
} from './app.js';

// ── State ────────────────────────────────────────────────────
let currentUser   = null;
let currentQuery  = '';
let resultTab     = 'posts';
let recentSearches = JSON.parse(localStorage.getItem('ib_recent') || '[]');
let followingSet   = new Set();

const RECENT_MAX = 8;

// ── Init ─────────────────────────────────────────────────────
async function init() {
  currentUser = await getUser();
  loadTrending();
  loadWriters();
  loadTopicCounts();
  renderRecent();

  // Focus search if ?q param
  const q = new URLSearchParams(location.search).get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    triggerSearch(q);
  }
}

// ── Trending posts ────────────────────────────────────────────
async function loadTrending() {
  const { data } = await getFeed({ page: 0, limit: 6 });
  const container = document.getElementById('trending-feed');
  container.innerHTML = '';
  if (!data?.length) { container.innerHTML = '<div class="feed-end" style="display:flex">Nothing yet</div>'; return; }

  const ids = data.map(b => b.id);
  const [liked, bookmarked] = await Promise.all([
    getMyLikedIds(ids), getMyBookmarkedIds(ids)
  ]);

  data.forEach((blog, i) => {
    container.appendChild(createCompactCard(blog, liked.has(blog.id), bookmarked.has(blog.id), i));
  });
}

// ── Writers to follow ─────────────────────────────────────────
async function loadWriters() {
  // Fetch recent bloggers and show as chips
  const { data } = await getFeed({ page: 0, limit: 20 });
  const row = document.getElementById('writers-row');
  row.innerHTML = '';
  if (!data?.length) { row.style.display = 'none'; return; }

  // Deduplicate by author
  const seen = new Set();
  const writers = [];
  for (const blog of data) {
    if (!seen.has(blog.author_id)) {
      seen.add(blog.author_id);
      writers.push(blog);
    }
  }

  for (const w of writers.slice(0, 10)) {
    const following = await isFollowing(w.author_id);
    if (following) followingSet.add(w.author_id);
    row.appendChild(createWriterChip(w, following));
  }
}

function createWriterChip(w, following) {
  const chip = document.createElement('div');
  chip.className = 'writer-chip';
  chip.dataset.id = w.author_id;
  const av = w.avatar_url
    ? `<img src="${w.avatar_url}" alt="${w.display_name}" loading="lazy"/>`
    : `<span>${initials(w.display_name || w.username)}</span>`;

  chip.innerHTML = `
    <div class="writer-chip__avatar">
      <div class="avatar avatar--md">${av}</div>
      ${!following ? `<div class="writer-chip__follow" title="Follow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>` : ''}
    </div>
    <span class="writer-chip__name">${w.display_name || w.username}</span>`;

  chip.onclick = async (e) => {
    const followBtn = chip.querySelector('.writer-chip__follow');
    if (followBtn && followBtn.contains(e.target)) {
      e.stopPropagation();
      if (!currentUser) { navigate('/auth.html'); return; }
      chip.querySelector('.writer-chip__follow')?.remove();
      followingSet.add(w.author_id);
      await followUser(w.author_id);
      toast(`Following ${w.display_name || w.username}`);
    } else {
      navigate(`profile.html?u=${w.username}`);
    }
  };

  return chip;
}

// ── Topic counts ──────────────────────────────────────────────
async function loadTopicCounts() {
  const tags = ['technology','science','design','culture','health','finance','travel','food'];
  for (const tag of tags) {
    const { data } = await getFeed({ page: 0, limit: 100, tag });
    const el = document.getElementById(`count-${tag}`);
    if (el && data) el.textContent = `${formatCount(data.length)}${data.length === 100 ? '+' : ''} posts`;
  }
}

// ── Topic search ──────────────────────────────────────────────
window.searchTag = function(tag) {
  const input = document.getElementById('search-input');
  input.value = tag;
  triggerSearch(tag);
};

// ── Search input ──────────────────────────────────────────────
const debouncedSearch = debounce((q) => {
  if (q.trim().length >= 2) runSearch(q.trim());
}, 400);

window.onSearchInput = function(val) {
  currentQuery = val;
  const clearBtn = document.getElementById('search-clear');
  clearBtn.classList.toggle('search-clear--show', val.length > 0);

  if (val.length === 0) {
    showDiscover();
    return;
  }

  showSearchSection();
  if (val.trim().length >= 2) {
    document.getElementById('recent-searches-panel').style.display = 'none';
    document.getElementById('results-panel').style.display = 'block';
    showLoader();
    debouncedSearch(val);
  } else {
    document.getElementById('results-panel').style.display = 'none';
    document.getElementById('recent-searches-panel').style.display = 'block';
  }
};

window.onSearchFocus = function() {
  if (!currentQuery) {
    showSearchSection();
    renderRecent();
  }
};

function triggerSearch(q) {
  currentQuery = q;
  document.getElementById('search-clear').classList.add('search-clear--show');
  showSearchSection();
  document.getElementById('recent-searches-panel').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';
  showLoader();
  runSearch(q);
}

window.clearSearch = function() {
  document.getElementById('search-input').value = '';
  currentQuery = '';
  document.getElementById('search-clear').classList.remove('search-clear--show');
  showDiscover();
};

function showDiscover() {
  document.getElementById('discover-section').style.display = 'block';
  document.getElementById('search-section').classList.remove('search-section--show');
}

function showSearchSection() {
  document.getElementById('discover-section').style.display = 'none';
  document.getElementById('search-section').classList.add('search-section--show');
}

function showLoader() {
  document.getElementById('posts-loader').style.display = 'flex';
  document.getElementById('posts-list').innerHTML = '';
  document.getElementById('writers-loader').style.display = 'flex';
  document.getElementById('writers-list').innerHTML = '';
}

// ── Run search ────────────────────────────────────────────────
async function runSearch(q) {
  addRecentSearch(q);

  const [postsRes, writersRes] = await Promise.all([
    searchBlogs(q, { limit: 20 }),
    searchWriters(q),
  ]);

  // Posts
  document.getElementById('posts-loader').style.display = 'none';
  const postsList = document.getElementById('posts-list');
  postsList.innerHTML = '';

  if (!postsRes.data?.length) {
    postsList.innerHTML = noResults(`No posts for "${q}"`, 'Try a different keyword or browse topics below.');
  } else {
    const ids = postsRes.data.map(b => b.id);
    const [liked, bookmarked] = await Promise.all([
      getMyLikedIds(ids), getMyBookmarkedIds(ids)
    ]);
    postsRes.data.forEach((blog, i) => {
      postsList.appendChild(createCompactCard(blog, liked.has(blog.id), bookmarked.has(blog.id), i));
    });
  }

  // Writers
  document.getElementById('writers-loader').style.display = 'none';
  const writersList = document.getElementById('writers-list');
  writersList.innerHTML = '';

  if (!writersRes.length) {
    writersList.innerHTML = noResults(`No writers for "${q}"`, 'Try searching by username or display name.');
  } else {
    writersRes.forEach(w => writersList.appendChild(createWriterItem(w)));
  }
}

async function searchWriters(q) {
  // Search profiles by username or display_name using supabase
  const { supabase } = await import('./app.js');
  const { data } = await supabase
    .from('profile_stats')
    .select('*')
    .or(`username.ilike.%${q}%,display_name.ilike.%${q}%`)
    .limit(10);
  return data ?? [];
}

function createWriterItem(w) {
  const el = document.createElement('div');
  el.className = 'writer-item';
  const av = w.avatar_url
    ? `<img src="${w.avatar_url}" alt="${w.display_name}" loading="lazy"/>`
    : `<span>${initials(w.display_name || w.username)}</span>`;
  const isF = followingSet.has(w.id);

  el.innerHTML = `
    <div class="avatar avatar--md">${av}</div>
    <div class="writer-item__info">
      <div class="writer-item__name">${w.display_name || w.username}</div>
      <div class="writer-item__meta">@${w.username} · ${formatCount(w.follower_count)} followers</div>
      ${w.bio ? `<div class="writer-item__bio">${w.bio}</div>` : ''}
    </div>
    <button class="btn ${isF ? 'btn--following' : 'btn--follow'} btn--sm"
      data-uid="${w.id}" data-following="${isF}"
      onclick="handleWriterFollow(event, this)"
    >${isF ? 'Following' : 'Follow'}</button>`;

  el.onclick = (e) => {
    if (!e.target.closest('button')) navigate(`profile.html?u=${w.username}`);
  };
  return el;
}

window.handleWriterFollow = async function(e, btn) {
  e.stopPropagation();
  if (!currentUser) { navigate('/auth.html'); return; }
  const uid   = btn.dataset.uid;
  const isF   = btn.dataset.following === 'true';
  btn.dataset.following = !isF;
  btn.className = `btn ${!isF ? 'btn--following' : 'btn--follow'} btn--sm`;
  btn.textContent = !isF ? 'Following' : 'Follow';
  isF ? (await unfollowUser(uid), followingSet.delete(uid))
      : (await followUser(uid), followingSet.add(uid));
  toast(!isF ? 'Followed' : 'Unfollowed');
};

// ── Result tab switching ──────────────────────────────────────
window.switchResultTab = function(tab) {
  resultTab = tab;
  ['posts','writers'].forEach(t => {
    document.getElementById(`rtab-${t}`).classList.toggle('result-tab--active', t === tab);
    document.getElementById(`results-${t}`).style.display = t === tab ? 'block' : 'none';
  });
};

// ── Compact card for search results ──────────────────────────
function createCompactCard(blog, liked, bookmarked, idx) {
  const card = document.createElement('a');
  card.href  = `blog.html?slug=${blog.slug}`;
  card.className = 'blog-card blog-card--compact';
  card.style.animationDelay = `${idx * 30}ms`;

  const av = blog.avatar_url
    ? `<img src="${blog.avatar_url}" alt="" loading="lazy"/>`
    : `<span>${initials(blog.display_name || blog.username)}</span>`;

  card.innerHTML = `
    <div class="blog-card__body">
      <div class="blog-card__text-area">
        <div class="blog-card__author">
          <div class="avatar avatar--xs">${av}</div>
          <span class="blog-card__author-name">${blog.display_name || blog.username}</span>
          <span class="blog-card__time">${timeAgo(blog.published_at)}</span>
        </div>
        <div class="blog-card__title">${blog.title}</div>
        ${blog.subtitle ? `<div class="blog-card__excerpt">${blog.subtitle}</div>` : ''}
        <div class="blog-card__footer" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <button class="blog-card__action ${liked ? 'blog-card__action--liked' : ''}"
            data-id="${blog.id}" data-liked="${liked}" onclick="handleLike(event,this)">
            <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            ${formatCount(blog.like_count)}
          </button>
          <button class="blog-card__action" onclick="event.preventDefault();navigate('blog.html?slug=${blog.slug}#comments')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            ${formatCount(blog.comment_count)}
          </button>
          <span class="blog-card__spacer"></span>
          <span class="read-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            ${blog.read_time ?? 1}m
          </span>
          <button class="blog-card__action ${bookmarked?'blog-card__action--bookmarked':''}"
            data-id="${blog.id}" data-bookmarked="${bookmarked}" onclick="handleBookmark(event,this)">
            <svg viewBox="0 0 24 24" fill="${bookmarked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>
      </div>
      ${blog.cover_url
        ? `<img class="blog-card__thumb" src="${blog.cover_url}" alt="" loading="lazy"/>`
        : `<div class="blog-card__thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/><path d="M3 15h18"/></svg></div>`
      }
    </div>`;

  card.querySelectorAll('.blog-card__action').forEach(b => b.addEventListener('click', e => e.preventDefault()));
  return card;
}

// ── Like / Bookmark (same logic as index) ────────────────────
window.handleLike = async function(e, btn) {
  e.stopPropagation();
  if (!currentUser) { toast('Sign in to like'); navigate('/auth.html'); return; }
  const id = btn.dataset.id;
  const was = btn.dataset.liked === 'true';
  btn.dataset.liked = !was;
  btn.classList.toggle('blog-card__action--liked', !was);
  btn.querySelector('svg').setAttribute('fill', !was ? 'currentColor' : 'none');
  const svg = btn.querySelector('svg');
  svg.style.transform = 'scale(1.4)';
  setTimeout(() => svg.style.transform = '', 200);
  was ? await unlikeBlog(id) : await likeBlog(id);
};

window.handleBookmark = async function(e, btn) {
  e.stopPropagation();
  if (!currentUser) { toast('Sign in to save'); navigate('/auth.html'); return; }
  const id = btn.dataset.id;
  const was = btn.dataset.bookmarked === 'true';
  btn.dataset.bookmarked = !was;
  btn.classList.toggle('blog-card__action--bookmarked', !was);
  btn.querySelector('svg').setAttribute('fill', !was ? 'currentColor' : 'none');
  await toggleBookmark(id);
  toast(!was ? 'Saved' : 'Removed');
};

// ── Recent searches ───────────────────────────────────────────
function addRecentSearch(q) {
  recentSearches = [q, ...recentSearches.filter(r => r !== q)].slice(0, RECENT_MAX);
  localStorage.setItem('ib_recent', JSON.stringify(recentSearches));
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  const panel = document.getElementById('recent-searches-panel');
  if (!recentSearches.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  list.innerHTML = recentSearches.map((q, i) => `
    <div class="recent-search-item">
      <div class="recent-search-item__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <span class="recent-search-item__text" onclick="reuseRecent('${q.replace(/'/g,"\\'")}')">
        ${q}
      </span>
      <button class="recent-search-item__remove" onclick="removeRecent(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>`).join('');
}

window.reuseRecent = function(q) {
  document.getElementById('search-input').value = q;
  triggerSearch(q);
};

window.removeRecent = function(i) {
  recentSearches.splice(i, 1);
  localStorage.setItem('ib_recent', JSON.stringify(recentSearches));
  renderRecent();
};

window.clearAllRecent = function() {
  recentSearches = [];
  localStorage.removeItem('ib_recent');
  renderRecent();
};

window.showAllWriters = function() {
  document.getElementById('search-input').value = ' ';
  document.getElementById('search-input').focus();
  showSearchSection();
  document.getElementById('recent-searches-panel').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';
  switchResultTab('writers');
  showLoader();
  runSearch('');
};

// ── No results template ───────────────────────────────────────
function noResults(title, sub) {
  return `<div class="no-results">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
    <div class="no-results__title">${title}</div>
    <div class="no-results__sub">${sub}</div>
  </div>`;
}

init();
</script>
</body>
