<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YouBlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --ink:       #0e0d0b;
  --ink-2:     #2a2825;
  --ink-3:     #6b6760;
  --paper:     #f9f8f5;
  --paper-2:   #f2f0eb;
  --paper-3:   #e8e5de;
  --gold:      #b8975a;
  --gold-light:#f5edd8;
  --danger:    #c0392b;
  --white:     #ffffff;
  --radius-sm: 8px;
  --radius:    14px;
  --radius-lg: 20px;
  --nav-h:     58px;
  --ease:      cubic-bezier(0.4,0,0.2,1);
  --spring:    cubic-bezier(0.34,1.56,0.64,1);
  --shadow-xs: 0 1px 3px rgba(0,0,0,.06);
  --shadow-sm: 0 2px 12px rgba(0,0,0,.07);
  --shadow:    0 4px 24px rgba(0,0,0,.09);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.13);
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
button, input, textarea { font-family: inherit; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ── LOADER ─────────────────────────────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: var(--paper);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s var(--ease), visibility 0.5s;
}
#loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
.loader-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  position: relative;
}
.loader-wordmark::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 0; right: 100%;
  height: 1.5px;
  background: var(--gold);
  animation: loader-line 1.4s var(--ease) forwards;
}
@keyframes loader-line { to { right: 0; } }
.loader-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
  margin-top: 24px;
  animation: loader-dot 1.4s var(--ease) infinite;
}
@keyframes loader-dot { 0%,100%{opacity:.2;transform:scale(.6)} 50%{opacity:1;transform:scale(1)} }

/* ── NAV ────────────────────────────────────────────────────── */
#mainNav {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(249,248,245,0.88);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--paper-3);
  display: none;
  align-items: center;
  padding: 0 16px 0 20px;
  gap: 10px;
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: -0.02em;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--ink);
}
.nav-logo span { color: var(--gold); }

.nav-search-wrap {
  flex: 1;
  max-width: 260px;
  position: relative;
}
.nav-search-wrap svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  pointer-events: none;
}
.nav-search-input {
  width: 100%; padding: 7px 10px 7px 32px;
  background: var(--paper-2);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  font-size: 13px; color: var(--ink);
  outline: none;
  transition: all .2s var(--ease);
}
.nav-search-input::placeholder { color: var(--ink-3); }
.nav-search-input:focus {
  background: var(--white);
  border-color: var(--paper-3);
  box-shadow: var(--shadow-xs);
}

.nav-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }

/* ── ICON BUTTON ────────────────────────────────────────────── */
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-2);
  transition: background .18s var(--ease), color .18s var(--ease);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--paper-2); }
.icon-btn:active { background: var(--paper-3); transform: scale(.94); }

/* ── AVATAR ─────────────────────────────────────────────────── */
.avatar {
  border-radius: 50%; overflow: hidden;
  background: var(--ink);
  color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none;
  transition: all .18s var(--ease);
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

.btn-primary {
  background: var(--ink); color: var(--white);
}
.btn-primary:hover { background: var(--ink-2); box-shadow: 0 4px 14px rgba(0,0,0,.18); }

.btn-gold {
  background: var(--gold); color: var(--white);
  box-shadow: 0 2px 8px rgba(184,151,90,.3);
}
.btn-gold:hover { background: #a8874a; box-shadow: 0 4px 16px rgba(184,151,90,.4); }

.btn-ghost {
  background: transparent; color: var(--ink);
  border: 1.5px solid var(--paper-3);
}
.btn-ghost:hover { background: var(--paper-2); border-color: var(--paper-3); }

.btn-danger { background: var(--danger); color: var(--white); }
.btn-danger:hover { background: #a93226; }

.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }

/* ── PAGES ──────────────────────────────────────────────────── */
.page { display: none; }
.page.active {
  display: block;
  animation: page-in 0.32s var(--ease) both;
}
@keyframes page-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════
   HOME
══════════════════════════════════════════════════════════════ */
.home-hero {
  padding: 52px 20px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse at 50% 0%, rgba(184,151,90,.1) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gold);
  background: var(--gold-light);
  padding: 4px 12px; border-radius: 20px;
  margin-bottom: 18px;
  border: 1px solid rgba(184,151,90,.2);
}
.home-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.4rem, 8vw, 3.8rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 14px;
  color: var(--ink);
}
.home-hero h1 em { font-style: italic; color: var(--gold); }
.home-hero p {
  color: var(--ink-3); font-size: 1rem;
  max-width: 340px; margin: 0 auto 28px;
  line-height: 1.65;
}
.hero-cta { display: flex; align-items: center; justify-content: center; gap: 10px; }

/* tags bar */
.tags-scroll {
  padding: 0 20px 20px;
  display: flex; gap: 7px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tags-scroll::-webkit-scrollbar { display: none; }
.tag-pill {
  flex-shrink: 0;
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--paper-3);
  background: var(--white);
  color: var(--ink-3);
  cursor: pointer;
  transition: all .18s var(--ease);
  white-space: nowrap;
}
.tag-pill:hover { border-color: var(--ink-3); color: var(--ink); }
.tag-pill.active {
  background: var(--ink); color: var(--white);
  border-color: var(--ink);
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

/* posts grid */
.posts-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--paper-3);
  border-top: 1px solid var(--paper-3);
  border-bottom: 1px solid var(--paper-3);
}
@media(min-width: 640px) {
  .posts-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    padding: 0 20px;
    background: transparent;
  }
  .post-card { border: 1px solid var(--paper-3); border-radius: var(--radius); }
}
@media(min-width: 1024px) {
  .posts-grid { grid-template-columns: repeat(3, 1fr); max-width: 1160px; margin: 0 auto; }
}

/* post card */
.post-card {
  background: var(--white);
  cursor: pointer;
  transition: transform .22s var(--ease), box-shadow .22s var(--ease);
  overflow: hidden;
  will-change: transform;
}
@media(min-width: 640px) {
  .post-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    z-index: 1;
  }
}
.post-card:active { transform: scale(.98); }

.card-cover {
  width: 100%; height: 180px;
  object-fit: cover;
  background: var(--paper-2);
  transition: transform .4s var(--ease);
}
.post-card:hover .card-cover { transform: scale(1.03); }
.card-cover-wrap { overflow: hidden; position: relative; }
.card-no-cover {
  width: 100%; height: 180px;
  background: linear-gradient(135deg, var(--paper-2) 0%, var(--paper-3) 100%);
  display: flex; align-items: center; justify-content: center;
  color: var(--paper-3);
}

.card-body { padding: 16px 18px 14px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
.card-tag {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
  background: var(--gold-light); color: var(--gold);
  padding: 2px 8px; border-radius: 4px;
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem; font-weight: 600;
  line-height: 1.3; margin-bottom: 7px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-excerpt {
  font-size: 13px; color: var(--ink-3); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 14px;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 11px; border-top: 1px solid var(--paper-2);
}
.card-author { display: flex; align-items: center; gap: 8px; }
.card-author-name { font-size: 12px; font-weight: 500; color: var(--ink-2); }
.card-meta { display: flex; align-items: center; gap: 10px; color: var(--ink-3); font-size: 11px; }
.card-meta-item { display: flex; align-items: center; gap: 3px; }

/* stagger cards */
.post-card:nth-child(1) { animation-delay: .04s }
.post-card:nth-child(2) { animation-delay: .08s }
.post-card:nth-child(3) { animation-delay: .12s }
.post-card:nth-child(4) { animation-delay: .16s }
.post-card:nth-child(5) { animation-delay: .20s }
.post-card:nth-child(6) { animation-delay: .24s }
.post-card { animation: card-in .38s var(--ease) both; }
@keyframes card-in {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════
   READ PAGE
══════════════════════════════════════════════════════════════ */
.read-wrap { max-width: 680px; margin: 0 auto; padding: 0 20px 80px; }

.read-cover-full {
  width: 100%; max-height: 400px; object-fit: cover;
  margin-bottom: 0;
}
.read-cover-full-wrap { margin-bottom: 0; }

.read-header { padding: 28px 20px 0; max-width: 680px; margin: 0 auto; }

.read-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.read-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold); background: var(--gold-light);
  padding: 3px 10px; border-radius: 4px;
  border: 1px solid rgba(184,151,90,.2);
}
.read-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.9rem, 5vw, 2.8rem);
  font-weight: 700; line-height: 1.18;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
}
.read-byline {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  padding: 14px 0;
  border-top: 1px solid var(--paper-3);
  border-bottom: 1px solid var(--paper-3);
  margin-bottom: 28px;
}
.read-author { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.read-author:active { opacity: .7; }
.read-author-name { font-size: 14px; font-weight: 500; }
.read-author-date { font-size: 12px; color: var(--ink-3); }
.read-stats { display: flex; align-items: center; gap: 14px; color: var(--ink-3); font-size: 12px; }
.read-stat { display: flex; align-items: center; gap: 4px; }

/* article body */
.read-body {
  font-size: 1.05rem; line-height: 1.88;
  color: var(--ink-2);
}
.read-body h1, .read-body h2, .read-body h3 {
  font-family: 'Cormorant Garamond', serif;
  color: var(--ink);
  margin: 2em 0 0.6em;
  line-height: 1.2;
}
.read-body h1 { font-size: 2rem; }
.read-body h2 { font-size: 1.6rem; }
.read-body h3 { font-size: 1.25rem; }
.read-body p { margin-bottom: 1.5em; }
.read-body ul, .read-body ol { margin: 0 0 1.5em 1.4em; }
.read-body li { margin-bottom: .5em; }
.read-body img { max-width: 100%; border-radius: var(--radius-sm); margin: 1em 0; }
.read-body blockquote {
  border-left: 3px solid var(--gold);
  padding: 4px 0 4px 20px;
  margin: 1.6em 0;
  color: var(--ink-3);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15em;
}
.read-body a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }
.read-body strong { font-weight: 600; color: var(--ink); }

/* reactions */
.reactions-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 0;
  margin: 32px 0 0;
  border-top: 1px solid var(--paper-3);
}
.react-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 24px;
  border: 1.5px solid var(--paper-3);
  background: var(--white);
  font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--ink-2);
  transition: all .18s var(--ease);
  font-family: 'DM Sans', sans-serif;
}
.react-btn:hover { border-color: var(--ink-3); background: var(--paper-2); }
.react-btn:active { transform: scale(.94); }
.react-btn.liked {
  background: var(--ink); color: var(--white);
  border-color: var(--ink);
}
.share-btn-small {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 24px;
  border: 1.5px solid var(--paper-3);
  background: var(--white);
  font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--ink-2);
  transition: all .18s var(--ease);
  font-family: 'DM Sans', sans-serif;
}
.share-btn-small:hover { border-color: var(--ink-3); background: var(--paper-2); }

/* comments */
.comments-section { margin-top: 36px; padding-top: 36px; border-top: 1px solid var(--paper-3); }
.comments-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 600;
  margin-bottom: 22px;
}
.comment-textarea {
  width: 100%; padding: 12px 14px;
  background: var(--paper-2);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  font-size: 14px; color: var(--ink);
  resize: vertical; min-height: 88px;
  outline: none;
  transition: all .2s var(--ease);
  line-height: 1.6;
}
.comment-textarea::placeholder { color: var(--ink-3); }
.comment-textarea:focus {
  background: var(--white);
  border-color: var(--paper-3);
  box-shadow: var(--shadow-xs);
}
.comment-form-footer { display: flex; justify-content: flex-end; margin-top: 10px; }

.comment-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--paper-2);
  animation: card-in .3s var(--ease) both;
}
.comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.comment-name { font-size: 13px; font-weight: 500; }
.comment-date { font-size: 11px; color: var(--ink-3); margin-left: auto; }
.comment-text { font-size: 14px; line-height: 1.65; color: var(--ink-2); }

/* ═══════════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════════ */
.auth-wrap {
  min-height: calc(100vh - var(--nav-h));
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.auth-card {
  background: var(--white);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  width: 100%; max-width: 400px;
  box-shadow: var(--shadow-lg);
  animation: card-in .3s var(--ease) both;
}
.auth-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700;
  text-align: center; margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.auth-logo span { color: var(--gold); }
.auth-sub {
  text-align: center; color: var(--ink-3);
  font-size: 13px; margin-bottom: 30px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; font-weight: 600;
  margin-bottom: 6px; color: var(--ink-3);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.form-input {
  width: 100%; padding: 11px 14px;
  background: var(--paper-2);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  font-size: 14px; color: var(--ink);
  transition: all .2s var(--ease); outline: none;
}
.form-input::placeholder { color: var(--ink-3); }
.form-input:focus {
  background: var(--white);
  border-color: var(--paper-3);
  box-shadow: 0 0 0 3px rgba(0,0,0,.04);
}
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 42px; }
.pw-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ink-3); display: flex; padding: 0;
  transition: color .18s;
}
.pw-toggle:hover { color: var(--ink); }
.auth-error {
  background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 13px; margin-bottom: 16px; display: none;
  animation: card-in .2s ease;
}
.auth-error.show { display: block; }
.auth-switch {
  text-align: center; margin-top: 18px;
  font-size: 13px; color: var(--ink-3);
}
.auth-switch span {
  color: var(--ink); font-weight: 500; cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
}
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--ink-3); font-size: 12px;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--paper-3);
}

/* ═══════════════════════════════════════════════════════════════
   PUBLISH
══════════════════════════════════════════════════════════════ */
.publish-wrap {
  max-width: 660px; margin: 0 auto;
  padding: 32px 20px 80px;
}
.publish-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem; font-weight: 700;
  margin-bottom: 28px;
}

.gdoc-import-box {
  background: var(--paper-2);
  border: 1.5px dashed var(--paper-3);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 0;
  transition: border-color .2s;
}
.gdoc-import-box:focus-within { border-color: var(--ink-3); }
.gdoc-import-row { display: flex; gap: 8px; }
.gdoc-import-row .form-input { flex: 1; background: var(--white); }

.gdoc-success {
  background: var(--white);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-top: 12px;
  display: none;
  animation: card-in .25s ease;
  gap: 12px;
  align-items: flex-start;
}
.gdoc-success.show { display: flex; }
.gdoc-success-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: #d1fae5; color: #065f46;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.gdoc-success-text { font-size: 13px; font-weight: 500; color: var(--ink); }
.gdoc-success-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

/* tags input */
.tags-input-box {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  padding: 8px 10px;
  background: var(--paper-2);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  cursor: text; min-height: 44px;
  transition: all .2s var(--ease);
}
.tags-input-box:focus-within {
  background: var(--white);
  border-color: var(--paper-3);
  box-shadow: 0 0 0 3px rgba(0,0,0,.04);
}
.tag-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--ink); color: var(--white);
  padding: 3px 10px; border-radius: 5px;
  font-size: 12px; font-weight: 500;
}
.tag-chip-remove {
  background: none; border: none;
  color: rgba(255,255,255,.6);
  cursor: pointer; padding: 0; line-height: 1;
  display: flex; transition: color .15s;
}
.tag-chip-remove:hover { color: var(--white); }
.tags-input-field {
  border: none; outline: none;
  background: transparent; flex: 1;
  font-size: 13px; color: var(--ink);
  min-width: 80px;
}
.tags-hint { font-size: 11px; color: var(--ink-3); margin-top: 5px; }
.publish-footer { margin-top: 28px; display: flex; gap: 10px; align-items: center; }

/* ═══════════════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════════════ */
.dash-wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
.dash-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.dash-greeting {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem; font-weight: 700;
  letter-spacing: -0.02em;
}
.dash-sub { font-size: 13px; color: var(--ink-3); margin-top: 3px; }
.dash-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px; margin-bottom: 32px;
}
@media(min-width: 540px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

.stat-card {
  background: var(--white);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: box-shadow .2s var(--ease);
}
.stat-card:hover { box-shadow: var(--shadow-sm); }
.stat-label {
  font-size: 11px; font-weight: 600;
  color: var(--ink-3); text-transform: uppercase;
  letter-spacing: 0.07em; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem; font-weight: 700;
  color: var(--ink); line-height: 1;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem; font-weight: 600;
  margin-bottom: 14px;
}

.posts-list { display: flex; flex-direction: column; gap: 10px; }
.post-list-item {
  background: var(--white);
  border: 1px solid var(--paper-3);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: box-shadow .2s var(--ease);
  animation: card-in .35s var(--ease) both;
}
.post-list-item:hover { box-shadow: var(--shadow-sm); }
.post-list-thumb {
  width: 64px; height: 48px;
  border-radius: 8px; object-fit: cover;
  flex-shrink: 0; background: var(--paper-2);
}
.post-list-info { flex: 1; min-width: 0; }
.post-list-title {
  font-size: 14px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.post-list-meta { display: flex; gap: 12px; font-size: 12px; color: var(--ink-3); flex-wrap: wrap; }
.post-list-meta-item { display: flex; align-items: center; gap: 4px; }
.post-list-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════════════════════ */
.profile-wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
.profile-hero {
  text-align: center; margin-bottom: 36px; padding-bottom: 32px;
  border-bottom: 1px solid var(--paper-3);
}
.profile-avatar-lg {
  width: 76px; height: 76px; border-radius: 50%;
  background: var(--ink); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem; font-weight: 600;
  margin: 0 auto 14px;
  font-family: 'Cormorant Garamond', serif;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
}
.profile-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700;
  margin-bottom: 6px;
}
.profile-bio { color: var(--ink-3); font-size: 14px; max-width: 360px; margin: 0 auto; }
.profile-counts {
  display: flex; justify-content: center; gap: 36px; margin-top: 20px;
}
.profile-count-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 700; text-align: center;
}
.profile-count-label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }

/* ═══════════════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 600;
  display: none; align-items: flex-end; justify-content: center;
  padding: 0;
}
@media(min-width: 480px) {
  .modal-overlay { align-items: center; padding: 24px; }
}
.modal-overlay.show { display: flex; animation: overlay-in .22s ease; }
@keyframes overlay-in { from{opacity:0} to{opacity:1} }

.modal-sheet {
  background: var(--white);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 28px 24px 36px;
  width: 100%; max-width: 420px;
  animation: sheet-in .28s var(--spring);
}
@media(min-width: 480px) {
  .modal-sheet { border-radius: var(--radius-lg); padding: 32px; }
}
@keyframes sheet-in {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--paper-3);
  margin: 0 auto 20px;
}
@media(min-width: 480px) { .modal-handle { display: none; } }
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 600; margin-bottom: 8px;
}
.modal-body { font-size: 13px; color: var(--ink-3); margin-bottom: 22px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ═══════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════ */
#toastStack {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 9000;
  display: flex; flex-direction: column-reverse;
  gap: 8px; align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--ink); color: var(--white);
  padding: 11px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px;
  animation: toast-in .3s var(--spring) both;
  white-space: nowrap;
  pointer-events: none;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateY(16px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.toast-out {
  animation: toast-out .25s var(--ease) both;
}
@keyframes toast-out {
  to { opacity: 0; transform: translateY(8px) scale(.95); }
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════════ */
.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  color: var(--ink-3); font-size: 13px;
  cursor: pointer; background: none; border: none;
  margin-bottom: 24px;
  transition: color .18s;
  padding: 0;
}
.back-btn:hover { color: var(--ink); }

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--paper-3);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .65s linear infinite;
  display: inline-block; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.flex-center { display: flex; align-items: center; justify-content: center; }
.load-screen { padding: 80px 0; }

.empty-state {
  text-align: center; padding: 56px 24px;
  color: var(--ink-3);
  animation: card-in .3s ease;
}
.empty-state svg { margin: 0 auto 16px; opacity: .35; }
.empty-state-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; color: var(--ink);
  margin-bottom: 6px;
}
.empty-state-sub { font-size: 13px; }

.section-gap { height: 32px; }
.divider { height: 1px; background: var(--paper-3); margin: 24px 0; }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-wordmark">YouBlog</div>
  <div class="loader-dot"></div>
</div>

<!-- NAV -->
<nav id="mainNav">
  <span class="nav-logo" onclick="showPage('home')">You<span>Blog</span></span>
  <div class="nav-search-wrap" id="navSearchWrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="nav-search-input" id="searchInput" placeholder="Search posts…" oninput="handleSearch(this.value)" autocomplete="off">

<!-- PAGES -->

<div id="page-read"      class="page"></div>

<div id="page-dashboard" class="page"></div>
<div id="page-profile"   class="page"></div>

</div>

<!-- TOAST STACK -->
<div id="toastStack"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — replace with your values
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ─────────────────────────────────────────────────────
let currentUser = null;
let currentPage = 'home';
let allPosts    = [];
let activeTag   = 'All';
let searchQuery = '';
let deletePostId = null;
let currentPost  = null;
let publishTags  = [];
let importedHTML = '';
let importedTitle = '';
let editPostId   = null;

// ── ICONS (reusable SVG snippets) ────────────────────────────
const ICONS = {
  eye:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  heart:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  heartFill: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  chat:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  share:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
  link:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  edit:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  plus:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>`,
  back:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`,
  signout:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  check:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  file:   `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  image:  `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  write:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>`,
  dash:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  views:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  posts:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  likes:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  comments:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
};

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  document.getElementById('mainNav').style.display = 'flex';
  renderNav();
  await showPage('home');
  setTimeout(() => document.getElementById('loader').classList.add('hide'), 300);

  sb.auth.onAuthStateChange((_e, session) => {
    currentUser = session?.user || null;
    renderNav();
  });
}

// ══════════════════════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════════════════════
function renderNav() {
  const el = document.getElementById('navAuth');
  if (currentUser) {
    const initials = getInitials(currentUser.user_metadata?.full_name || currentUser.email);
    el.innerHTML = `
      <button class="icon-btn" onclick="showPage('publish')" title="Write">
        ${ICONS.write}
      </button>
      <div class="avatar" style="width:32px;height:32px;cursor:pointer;font-size:11px"
        onclick="showPage('dashboard')">${initials}</div>`;
  } else {
    el.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="showPage('auth','login')">Sign in</button>
      <button class="btn btn-primary btn-sm" onclick="showPage('auth','signup')">Sign up</button>`;
  }
}

// ══════════════════════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════════════════════
async function showPage(name, sub = null) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + name);
  if (!el) return;
  el.classList.add('active');
  currentPage = name;
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (name === 'home')      await renderHome();
  if (name === 'auth')      renderAuth(sub || 'login');
  if (name === 'publish')   { if (!currentUser) { showPage('auth','login'); return; } renderPublish(); }
  if (name === 'dashboard') { if (!currentUser) { showPage('auth','login'); return; } await renderDashboard(); }
}

// ══════════════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════════════
async function renderHome() {
  const el = document.getElementById('page-home');
  el.innerHTML = `<div class="flex-center load-screen"><div class="spinner"></div></div>`;

  const { data: posts } = await sb
    .from('posts')
    .select('*, profiles(full_name, avatar_url)')
    .order('created_at', { ascending: false });

  allPosts = posts || [];
  buildHome();
}

function buildHome() {
  const el = document.getElementById('page-home');
  const filtered = getFiltered();
  const allTags = ['All'];
  allPosts.forEach(p => (p.tags || []).forEach(t => { if (!allTags.includes(t)) allTags.push(t); }));

  el.innerHTML = `
    <div class="home-hero">
      <div class="hero-label">${ICONS.write} Journal & Stories</div>
      <h1>Ideas worth<br><em>reading.</em></h1>
      <p>Discover stories, thinking, and expertise from writers on every topic.</p>
      ${!currentUser ? `<div class="hero-cta">
        <button class="btn btn-primary" onclick="showPage('auth','signup')">Start writing</button>
        <button class="btn btn-ghost" onclick="showPage('auth','login')">Sign in</button>
      </div>` : ''}
    </div>
    <div class="tags-scroll">
      ${allTags.map(t => `<div class="tag-pill${t===activeTag?' active':''}" onclick="filterByTag('${esc(t)}')">${esc(t)}</div>`).join('')}
    </div>
    <div class="posts-grid">
      ${filtered.length === 0 ? emptyState('No posts yet', 'Be the first to publish something.') : filtered.map(postCard).join('')}
    </div>
    <div style="height:40px"></div>`;
}

function getFiltered() {
  return allPosts.filter(p => {
    const matchTag = activeTag === 'All' || (p.tags || []).includes(activeTag);
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      p.title?.toLowerCase().includes(q) ||
      p.excerpt?.toLowerCase().includes(q) ||
      p.profiles?.full_name?.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q));
    return matchTag && matchSearch;
  });
}

async function openPost(id) {
  showPage('read');
  const el = document.getElementById('page-read');
  el.innerHTML = `<div class="flex-center load-screen"><div class="spinner"></div></div>`;

  const { data: post } = await sb.from('posts')
    .select('*, profiles(full_name, avatar_url)').eq('id', id).single();
  if (!post) { el.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--ink-3)">Post not found.</div>'; return; }

  // increment view
  await sb.from('posts').update({ views: (post.views||0) + 1 }).eq('id', id);
  currentPost = { ...post, views: (post.views||0)+1 };

  let liked = false;
  if (currentUser) {
    const { data: lk } = await sb.from('likes').select('id').eq('post_id', id).eq('user_id', currentUser.id).maybeSingle();
    liked = !!lk;
  }

  const { data: comments } = await sb.from('comments')
    .select('*, profiles(full_name)').eq('post_id', id).order('created_at', { ascending: true });

  renderRead(post, liked, comments || []);
}

      <button class="back-btn" onclick="showPage('home')">${ICONS.back} Back to feed</button>
      ${(post.tags||[]).length ? `<div class="read-tags">${(post.tags||[]).map(t=>`<span class="read-tag">${esc(t)}</span>`).join('')}</div>` : ''}

        <div class="read-author" onclick="showProfile('${post.user_id}')">

          <div>
            <div class="read-author-name">${esc(author)}</div>

function commentItem(c) {
  return `<div class="comment-item">
    <div class="comment-header">
      <div class="avatar" style="width:28px;height:28px;font-size:10px">${getInitials(c.profiles?.full_name||'A')}</div>
      <span class="comment-name">${esc(c.profiles?.full_name||'Anonymous')}</span>
      <span class="comment-date">${formatDate(c.created_at)}</span>
    </div>
    <div class="comment-text">${esc(c.body)}</div>
  </div>`;

async function toggleLike(postId) {
  if (!currentUser) { showPage('auth','login'); return; }
  const btn = document.getElementById('likeBtn');
  const isLiked = btn.classList.contains('liked');
  const countEl = document.getElementById('likeCount');

  if (isLiked) {
    await sb.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
    const n = Math.max(0, parseInt(countEl.textContent) - 1);
    await sb.from('posts').update({ likes: n }).eq('id', postId);
    btn.classList.remove('liked');
    btn.innerHTML = `${ICONS.heart} <span id="likeCount">${n}</span>`;
  } else {
    await sb.from('likes').insert({ post_id: postId, user_id: currentUser.id });
    const n = parseInt(countEl.textContent) + 1;
    await sb.from('posts').update({ likes: n }).eq('id', postId);
    btn.classList.add('liked');
    btn.innerHTML = `${ICONS.heartFill} <span id="likeCount">${n}</span>`;
  }
}

async function submitComment(postId) {
  const input = document.getElementById('commentInput');
  const body = input.value.trim();
  if (!body) return;
  input.value = '';
  const { data, error } = await sb.from('comments')
    .insert({ post_id: postId, user_id: currentUser.id, body })
    .select('*, profiles(full_name)').single();
  if (!error && data) {
    const list = document.getElementById('commentsList');
    if (list.querySelector('p')) list.innerHTML = '';
    list.insertAdjacentHTML('beforeend', commentItem(data));
    toast('Comment posted', 'check');
  }
}

function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => toast('Link copied')); }
function sharePost(id, title) { if (navigator.share) navigator.share({ title, url: window.location.href }); else copyLink(); }

async function doLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const pw    = document.getElementById('authPassword').value;
  if (!email||!pw) { showAuthError('Please fill in all fields.'); return; }
  setAuthLoading(true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  setAuthLoading(false);
  if (error) { showAuthError(error.message); return; }
  toast('Welcome back!');
  showPage('home');
}

async function doSignup() {
  const name  = document.getElementById('authName')?.value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const pw    = document.getElementById('authPassword').value;
  if (!name||!email||!pw) { showAuthError('Please fill in all fields.'); return; }
  if (pw.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
  setAuthLoading(true);
  const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
  setAuthLoading(false);
  if (error) { showAuthError(error.message); return; }
  if (data.user) await sb.from('profiles').upsert({ id: data.user.id, full_name: name, email });
  toast('Welcome to YouBlog!');
  showPage('home');
}

function showAuthError(msg) {

function setAuthLoading(on) {
  const btn = document.getElementById('authSubmit');

function tagChipHTML(t) {
  return `<span class="tag-chip">${esc(t)}<button class="tag-chip-remove" onclick="removeTag('${esc(t)}')" type="button">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button></span>`;
}

function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.replace(',','').trim();
    if (val && !publishTags.includes(val)) {
      publishTags.push(val);
      document.getElementById('tagsBox').insertAdjacentHTML('beforeend', tagChipHTML(val));
    }
    e.target.value = '';
  }
}
function removeTag(t) {
  publishTags = publishTags.filter(x => x !== t);
  const box = document.getElementById('tagsBox');
  if (box) { Array.from(box.querySelectorAll('.tag-chip')).forEach(el => { if (el.textContent.trim().startsWith(t)) el.remove(); }); }
}

async function importGDoc() {
  const url = document.getElementById('gdocUrl').value.trim();
  if (!url) { toast('Paste a Google Doc URL first'); return; }
  const match = url.match(/\/document\/d\/([\w-]+)/);
  if (!match) { toast('Invalid Google Doc URL'); return; }
  const docId = match[1];
  const btn = document.getElementById('importBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div>';

  try {
    const res = await fetch(`https://docs.google.com/document/d/${docId}/export?format=html`);
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const title = doc.title.replace(/ - Google Docs$/, '').trim();
    const body = doc.body;
    body?.querySelectorAll('style,script,meta,link').forEach(el => el.remove());
    body?.querySelectorAll('[style]').forEach(el => {
      const keep = ['font-weight','font-style','text-decoration'];
      const s = el.getAttribute('style');
      const filtered = keep.map(k => { const m = s.match(new RegExp(`${k}:[^;]+`)); return m ? m[0] : null; }).filter(Boolean).join(';');
      if (filtered) el.setAttribute('style', filtered);
      else el.removeAttribute('style');
    });
    importedHTML  = body?.innerHTML || '';
    importedTitle = title;
    document.getElementById('postTitle').value = title;
    document.getElementById('previewTitle').textContent = title;
    document.getElementById('gdocPreview').classList.add('show');
    toast('Document imported!');
  } catch(e) {
    toast('Import failed — make sure the doc is public');
  }
  btn.disabled = false; btn.textContent = 'Import';
}

async function submitPost() {
  const title     = document.getElementById('postTitle').value.trim();
  const excerpt   = document.getElementById('postExcerpt').value.trim();
  const cover_url = document.getElementById('postCover').value.trim();

  if (!title) { toast('Please add a title'); return; }
  if (!importedHTML && !editPostId) { toast('Please import a Google Doc first'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div>';

  const payload = {
    title, excerpt, cover_url,
    tags: publishTags,
    body_html: importedHTML,
    user_id: currentUser.id,
    updated_at: new Date().toISOString()
  };

  let error;
  if (editPostId) {
    ({ error } = await sb.from('posts').update(payload).eq('id', editPostId));
  } else {
    payload.views = 0; payload.likes = 0;
    ({ error } = await sb.from('posts').insert(payload));
  }

  btn.disabled = false;
  btn.innerHTML = `${ICONS.write} ${editPostId ? 'Update post' : 'Publish post'}`;
  if (error) { toast('Error: ' + error.message); return; }
  toast(editPostId ? 'Post updated!' : 'Published!');
  importedHTML = ''; importedTitle = ''; editPostId = null;
  showPage('home');
}

async function editPost(id) {
  const { data: post } = await sb.from('posts').select('*').eq('id', id).single();
  if (post) { showPage('publish'); renderPublish(post); }
}

              <div class="post-list-meta">
                <span class="post-list-meta-item">${ICONS.views} ${p.views||0}</span>
                <span class="post-list-meta-item">${ICONS.likes} ${p.likes||0}</span>
                <span>${formatDate(p.created_at)}</span>
              </div>
            </div>
            <div class="post-list-actions">
              <button class="btn btn-ghost btn-xs" onclick="openPost('${p.id}')">Read</button>
              <button class="btn btn-ghost btn-xs" onclick="editPost('${p.id}')">${ICONS.edit}</button>
              <button class="btn btn-danger btn-xs" onclick="confirmDelete('${p.id}')">${ICONS.trash}</button>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  PROFILE
// ══════════════════════════════════════════════════════════════
async function showProfile(userId) {
  showPage('profile');
  const el = document.getElementById('page-profile');
  el.innerHTML = `<div class="flex-center load-screen"><div class="spinner"></div></div>`;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', userId).single();
  const { data: posts }   = await sb.from('posts').select('*, profiles(full_name, avatar_url)')
    .eq('user_id', userId).order('created_at', { ascending: false });

  const name = profile?.full_name || 'Anonymous';
  const userPosts = posts || [];
  const totalViews = userPosts.reduce((s,p)=>s+(p.views||0),0);

  el.innerHTML = `
    <div class="profile-wrap">
      <button class="back-btn" onclick="history.back()">${ICONS.back} Back</button>
      <div class="profile-hero">
        <div class="profile-avatar-lg">${getInitials(name)}</div>
        <div class="profile-name">${esc(name)}</div>
        ${profile?.bio ? `<div class="profile-bio">${esc(profile.bio)}</div>` : ''}
        <div class="profile-counts">
          <div>
            <div class="profile-count-val">${userPosts.length}</div>
            <div class="profile-count-label">Posts</div>
          </div>
          <div>
            <div class="profile-count-val">${fmt(totalViews)}</div>
            <div class="profile-count-label">Views</div>
          </div>
        </div>
      </div>
      <div class="posts-grid">
        ${userPosts.map(postCard).join('')}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════
function toast(msg) {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(() => {
    t.classList.add('toast-out');
    setTimeout(() => t.remove(), 280);
  }, 2800);
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function getInitials(str) {
  if (!str) return '?';
  return str.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function calcReadTime(html) {
  const words = html.replace(/<[^>]+>/g,'').split(/\s+/).filter(Boolean).length;
  return `${Math.max(1, Math.round(words/200))} min read`;
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) { return (n||0).toLocaleString(); }
function emptyState(title, sub) {
  return `<div class="empty-state">
    <div>${ICONS.file}</div>
    <div class="empty-state-title">${title}</div>
    <div class="empty-state-sub">${sub}</div>
  </div>`;
}

// ── GO ────────────────────────────────────────────────────────
init();
</script>
