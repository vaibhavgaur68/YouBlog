<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-site-verification" content="E9wM_FkMnRzUbE9HCfYSdkm0wpBxcsi0MRSXO6aDXho" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YouBlogs — Read & Discover Stories</title>
  <meta name="description" content="YouBlogs is a place to read, write, and discover stories on topics you care about. Explore posts from writers around the world." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://youblogs.pages.dev/" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Feed-specific styles ── */

    /* New posts pill that appears on realtime update */
    .new-posts-pill {
      position: fixed;
      top: 160px; /* below full header-group (nav+tabs+tags ~148px + 12px gap) */
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: var(--amber);
      color: var(--ink-0);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: var(--sp-2) var(--sp-4);
      border-radius: var(--r-full);
      box-shadow: 0 4px 20px var(--amber-glow);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--t-base), transform var(--t-spring);
      white-space: nowrap;
    }

    .new-posts-pill--show {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    .new-posts-pill svg { width: 14px; height: 14px; }

    /* ── Tag filter strip ── */
    .tag-strip {
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,11,0.92);
      backdrop-filter: blur(16px);
    }

    .tag-strip::-webkit-scrollbar { display: none; }

    /* ── YouTube-style header hide on scroll ── */
    .header-group {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }

    .header-group--hidden {
      transform: translateY(-100%);
    }

    /* Smoothly remove top padding when header slides away */
    .page {
      transition: padding-top 0.28s cubic-bezier(0.4,0,0.2,1);
      /* Override global padding-top: header-group height = nav(60) + tabs(44) + tag-strip(44) */
      padding-top: 148px !important;
    }

    body.header-hidden .page {
      padding-top: 0 !important;
    }

    /* Also hide bottom nav on scroll down */
    .bottom-nav {
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .bottom-nav--hidden {
      transform: translateY(100%);
    }

    /* ── End of feed message ── */
    .feed-end {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-10) var(--sp-8);
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    .feed-end svg {
      width: 32px;
      height: 32px;
      color: var(--ink-5);
    }

    /* ── Load more button ── */
    .load-more-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      width: calc(100% - var(--sp-8));
      margin: 0 var(--sp-4) var(--sp-4);
      height: 44px;
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-radius: var(--r-full);
      color: var(--text-sub);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast);
      font-family: var(--font-body);
    }

    .load-more-btn:hover { background: var(--ink-3); color: var(--text); }
    .load-more-btn svg { width: 16px; height: 16px; }

    /* ── Featured / hero card (first card) ── */
    .blog-card--hero .blog-card__cover {
      aspect-ratio: 16 / 9;
    }

    .blog-card--hero .blog-card__title {
      font-size: var(--text-xl);
    }

    /* ── Compact card (no cover) ── */
    .blog-card--compact .blog-card__body {
      display: flex;
      gap: var(--sp-3);
      align-items: flex-start;
    }

    .blog-card--compact .blog-card__text-area {
      flex: 1;
      min-width: 0;
    }

    .blog-card--compact .blog-card__thumb {
      width: 76px;
      height: 76px;
      border-radius: var(--r-md);
      object-fit: cover;
      background: var(--ink-3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blog-card--compact .blog-card__thumb svg {
      width: 22px;
      height: 22px;
      color: var(--ink-5);
    }

    .blog-card--compact .blog-card__title {
      font-size: var(--text-base);
      -webkit-line-clamp: 2;
    }

    .blog-card--compact .blog-card__excerpt {
      -webkit-line-clamp: 1;
      font-size: var(--text-xs);
    }

    /* ── Notification badge on bell ── */
    .notif-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      min-width: 16px;
      height: 16px;
      background: var(--amber);
      color: var(--ink-0);
      font-size: 9px;
      font-weight: 700;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--bg);
      line-height: 1;
      padding: 0 3px;
    }

    /* ── Inline loader ── */
    .inline-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-6);
    }

    .inline-loader svg {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
    }

    /* Feed item entrance animation */
    .blog-card {
      animation: feedItemIn 0.3s var(--t-spring) both;
    }

    @keyframes feedItemIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger children */
    .feed .blog-card:nth-child(1) { animation-delay: 0ms; }
    .feed .blog-card:nth-child(2) { animation-delay: 40ms; }
    .feed .blog-card:nth-child(3) { animation-delay: 80ms; }
    .feed .blog-card:nth-child(4) { animation-delay: 120ms; }
    .feed .blog-card:nth-child(5) { animation-delay: 160ms; }
    .feed .blog-card:nth-child(n+6) { animation-delay: 200ms; }
  </style>
  <!-- Page transition: prevents FOUC flash between pages -->
  <script>
    document.documentElement.classList.add("ready");
    document.addEventListener("click", function(e) {
      var a = e.target.closest("a[href]");
      if (!a) return;
      var href = a.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("javascript") || href.startsWith("http") || a.target === "_blank") return;
      e.preventDefault();
      document.body.classList.add("page-leaving");
      setTimeout(function() { window.location.href = href; }, 120);
    });
  </script>
</head>

<!-- ══════════════════════════════════════════════════════════
     SCRIPT

<script type="module">
import {
  getUser, getFeed, getFollowingFeed, getMyBookmarks,
  getMyLikedIds, getMyBookmarkedIds,
  likeBlog, unlikeBlog, toggleBookmark,
  getNotifications, markAllNotificationsRead, getUnreadNotificationCount,
  subscribeToFeed, subscribeToNotifications, unsubscribe,
  formatCount, timeAgo, initials, truncate, toast, navigate
} from './app.js';

// ── State ────────────────────────────────────────────────────
let currentFeed     = 'foryou';
let currentTag      = '';
let currentPage     = 0;
let isLoading       = false;
let hasMore         = true;
let allBlogs        = [];
let likedIds        = new Set();
let bookmarkedIds   = new Set();
let currentUser     = null;
let feedChannel     = null;
let notifChannel    = null;
let newPostsCount   = 0;

const LIMIT = 10;

// ── Init ─────────────────────────────────────────────────────
async function init() {
  currentUser = await getUser();
  loadNotifBadge();
  await loadFeed(true);
  setupRealtime();
}

// ── Feed switching ────────────────────────────────────────────
window.switchFeed = function(feed) {
  if (currentFeed === feed) return;
  currentFeed = feed;
  currentPage = 0;
  hasMore = true;
  allBlogs = [];

  ['foryou','following','bookmarks'].forEach(f => {
    document.getElementById(`tab-${f}`)?.classList.toggle('tab--active', f === feed);
  });

  // Show/hide tag strip
  document.getElementById('tag-strip').style.display = feed === 'foryou' ? 'flex' : 'none';

  // Reset
  document.getElementById('load-more-btn').style.display = 'none';
  document.getElementById('feed-end').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  loadFeed(true);
};

// ── Tag filter ────────────────────────────────────────────────
window.filterByTag = function(el, tag) {
  currentTag = tag;
  currentPage = 0;
  hasMore = true;
  allBlogs = [];
  document.querySelectorAll('.tag-strip .tag').forEach(t => t.classList.remove('tag--active'));
  el.classList.add('tag--active');
  loadFeed(true);
};

// ── Load feed ─────────────────────────────────────────────────
async function loadFeed(reset = false) {
  if (isLoading) return;
  isLoading = true;

  if (reset) {
    showSkeletons();
    document.getElementById('load-more-btn').style.display = 'none';
    document.getElementById('feed-end').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
  }

  let result;
  if (currentFeed === 'foryou') {
    result = await getFeed({ page: currentPage, limit: LIMIT, tag: currentTag || null });
  } else if (currentFeed === 'following') {
    if (!currentUser) {
      showEmpty('Sign in to follow writers', 'Your personalised feed lives here.');
      hideSkeletons(); isLoading = false; return;
    }
    result = await getFollowingFeed({ page: currentPage, limit: LIMIT });
  } else {
    if (!currentUser) {
      showEmpty('Sign in to save posts', 'Bookmark posts to read them later.');
      hideSkeletons(); isLoading = false; return;
    }
    // Bookmarks come back as { blog_id, blogs: {...} }
    const { data, error } = await getMyBookmarks({ page: currentPage, limit: LIMIT });
    result = {
      data: data?.map(b => ({ ...b.blogs, bookmarked: true })) ?? [],
      error
    };
  }

  const { data, error } = result;
  hideSkeletons();

  if (error) { toast('Failed to load feed', 'error'); isLoading = false; return; }

  if (reset) allBlogs = data ?? [];
  else allBlogs = [...allBlogs, ...(data ?? [])];

  hasMore = (data?.length ?? 0) === LIMIT;

  if (allBlogs.length === 0) {
    const empties = {
      foryou:    ['Nothing published yet', 'Be the first to write something.'],
      following: ['No posts yet', 'Writers you follow will appear here.'],
      bookmarks: ['No saved posts', 'Tap the bookmark on any post to save it.'],
    };
    showEmpty(...(empties[currentFeed] ?? ['Nothing here', '']));
    isLoading = false;
    return;
  }

  // Get liked / bookmarked sets
  const ids = allBlogs.map(b => b.id);
  [likedIds, bookmarkedIds] = await Promise.all([
    getMyLikedIds(ids),
    getMyBookmarkedIds(ids),
  ]);

  renderFeed(reset);
  document.getElementById('load-more-btn').style.display = hasMore ? 'flex' : 'none';
  if (!hasMore) document.getElementById('feed-end').style.display = 'flex';

  isLoading = false;
}

// ── Render ────────────────────────────────────────────────────
function renderFeed(reset) {
  const container = document.getElementById('feed');
  if (reset) container.innerHTML = '';

  const startIdx = reset ? 0 : allBlogs.length - (allBlogs.length % LIMIT || LIMIT);
  const slice    = reset ? allBlogs : allBlogs.slice(startIdx);

  slice.forEach((blog, i) => {
    const isFirst  = reset && i === 0;
    const isBookmarked = bookmarkedIds.has(blog.id) || blog.bookmarked;
    const isLiked  = likedIds.has(blog.id);
    container.appendChild(createCard(blog, isFirst, isLiked, isBookmarked));
  });
}

function createCard(blog, hero = false, liked = false, bookmarked = false) {
  const compact  = !hero && !blog.cover_url;
  const card     = document.createElement('a');
  card.href      = `blog.html?slug=${blog.slug}`;
  card.className = `blog-card${hero ? ' blog-card--hero' : ''}${compact ? ' blog-card--compact' : ''}`;

  const avatarContent = blog.avatar_url
    ? `<img src="${blog.avatar_url}" alt="${blog.display_name}" loading="lazy"/>`
    : `<span>${initials(blog.display_name || blog.username)}</span>`;

  const tags = (blog.tags || []).slice(0, 2)
    .map(t => `<span class="tag">${t}</span>`).join('');

  if (compact) {
    card.innerHTML = `
      <div class="blog-card__body">
        <div class="blog-card__text-area">
          <div class="blog-card__author">
            <div class="avatar avatar--xs">${avatarContent}</div>
            <span class="blog-card__author-name">${blog.display_name || blog.username}</span>
            <span class="blog-card__time">${timeAgo(blog.published_at)}</span>
          </div>
          <div class="blog-card__title">${blog.title}</div>
          ${blog.subtitle ? `<div class="blog-card__excerpt">${blog.subtitle}</div>` : ''}
          ${tags ? `<div class="blog-card__tags" style="margin-top:6px">${tags}</div>` : ''}
          <div class="blog-card__footer" style="margin-top:8px;padding-top:8px">
            ${actionBar(blog, liked, bookmarked)}
          </div>
        </div>
        <div class="blog-card__thumb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/><path d="M3 15h18"/>
          </svg>
        </div>
      </div>`;
  } else {
    card.innerHTML = `
      ${blog.cover_url
        ? `<img class="blog-card__cover" src="${blog.cover_url}" alt="${blog.title}" loading="lazy"/>`
        : `<div class="blog-card__cover blog-card__cover--placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
               <rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/><path d="M3 15h18"/>
             </svg>
           </div>`}
      <div class="blog-card__body">
        <div class="blog-card__author">
          <div class="avatar avatar--xs">${avatarContent}</div>
          <span class="blog-card__author-name">${blog.display_name || blog.username}</span>
          <span class="blog-card__time">${timeAgo(blog.published_at)}</span>
        </div>
        <div class="blog-card__title">${blog.title}</div>
        ${blog.subtitle ? `<div class="blog-card__excerpt">${blog.subtitle}</div>` : ''}
        ${tags ? `<div class="blog-card__tags">${tags}</div>` : ''}
        <div class="blog-card__footer">
          ${actionBar(blog, liked, bookmarked)}
        </div>
      </div>`;
  }

  // Intercept action buttons — prevent navigation
  card.querySelectorAll('.blog-card__action').forEach(btn => {
    btn.addEventListener('click', e => e.preventDefault());
  });

  return card;
}

function actionBar(blog, liked, bookmarked) {
  return `
    <button class="blog-card__action ${liked ? 'blog-card__action--liked' : ''}"
      data-id="${blog.id}" data-liked="${liked}" onclick="handleLike(event, this)">
      <svg viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      ${formatCount(blog.like_count)}
    </button>
    <button class="blog-card__action" onclick="navigate('blog.html?slug=${blog.slug}#comments')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      ${formatCount(blog.comment_count)}
    </button>
    <span class="blog-card__spacer"></span>
    <span class="read-time">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      ${blog.read_time ?? 1}m
    </span>
    <button class="blog-card__action ${bookmarked ? 'blog-card__action--bookmarked' : ''}"
      data-id="${blog.id}" data-bookmarked="${bookmarked}" onclick="handleBookmark(event, this)">
      <svg viewBox="0 0 24 24" fill="${bookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </button>`;
}

// ── Like ──────────────────────────────────────────────────────
window.handleLike = async function(e, btn) {
  e.stopPropagation();
  if (!currentUser) { toast('Sign in to like posts'); navigate('/auth.html'); return; }

  const id      = btn.dataset.id;
  const wasLiked = btn.dataset.liked === 'true';

  // Optimistic UI
  const svg = btn.querySelector('svg');
  btn.dataset.liked = !wasLiked;
  btn.classList.toggle('blog-card__action--liked', !wasLiked);
  svg.setAttribute('fill', !wasLiked ? 'currentColor' : 'none');

  const countEl = btn.childNodes[btn.childNodes.length - 1];
  const blog    = allBlogs.find(b => b.id === id);
  if (blog) {
    blog.like_count = Math.max(0, (blog.like_count || 0) + (!wasLiked ? 1 : -1));
    countEl.textContent = ' ' + formatCount(blog.like_count);
  }

  // Bounce animation
  svg.style.transform = 'scale(1.4)';
  setTimeout(() => svg.style.transform = '', 200);

  const fn = wasLiked ? unlikeBlog : likeBlog;
  const { error } = await fn(id);
  if (error) {
    // Revert
    btn.dataset.liked = wasLiked;
    btn.classList.toggle('blog-card__action--liked', wasLiked);
    svg.setAttribute('fill', wasLiked ? 'currentColor' : 'none');
    toast('Could not update like', 'error');
  }
};

// ── Bookmark ──────────────────────────────────────────────────
window.handleBookmark = async function(e, btn) {
  e.stopPropagation();
  if (!currentUser) { toast('Sign in to save posts'); navigate('/auth.html'); return; }

  const id          = btn.dataset.id;
  const wasBookmarked = btn.dataset.bookmarked === 'true';

  btn.dataset.bookmarked = !wasBookmarked;
  btn.classList.toggle('blog-card__action--bookmarked', !wasBookmarked);
  btn.querySelector('svg').setAttribute('fill', !wasBookmarked ? 'currentColor' : 'none');

  const svg = btn.querySelector('svg');
  svg.style.transform = 'scale(1.35)';
  setTimeout(() => svg.style.transform = '', 200);

  const { error } = await toggleBookmark(id);
  if (error) {
    btn.dataset.bookmarked = wasBookmarked;
    btn.classList.toggle('blog-card__action--bookmarked', wasBookmarked);
    toast('Could not update bookmark', 'error');
  } else {
    toast(!wasBookmarked ? 'Saved to bookmarks' : 'Removed from bookmarks');
  }
};

// ── Load more ─────────────────────────────────────────────────
window.loadMore = async function() {
  if (!hasMore || isLoading) return;
  currentPage++;
  const btn = document.getElementById('load-more-btn');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading…`;
  await loadFeed(false);
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg> Load more`;
};

// ── Refresh (new posts pill) ──────────────────────────────────
window.refreshFeed = function() {
  hidePill();
  currentPage = 0;
  hasMore = true;
  loadFeed(true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// ── Realtime ──────────────────────────────────────────────────
function setupRealtime() {
  feedChannel = subscribeToFeed((payload) => {
    if (currentFeed !== 'foryou') return;
    newPostsCount++;
    const pill = document.getElementById('new-posts-pill');
    const text = document.getElementById('new-posts-text');
    text.textContent = newPostsCount === 1 ? '1 new post' : `${newPostsCount} new posts`;
    pill.classList.add('new-posts-pill--show');
  });

  subscribeToNotifications((payload) => {
    loadNotifBadge();
  }).then(ch => { notifChannel = ch; });
}

function hidePill() {
  newPostsCount = 0;
  document.getElementById('new-posts-pill').classList.remove('new-posts-pill--show');
}

// ── Notifications ─────────────────────────────────────────────
async function loadNotifBadge() {
  if (!currentUser) return;
  const count = await getUnreadNotificationCount();
  const badge = document.getElementById('notif-badge');
  if (count > 0) {
    badge.textContent = count > 9 ? '9+' : count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

window.openNotifications = async function() {
  document.getElementById('notif-overlay').classList.add('sheet-overlay--open');
  document.getElementById('notif-sheet').classList.add('bottom-sheet--open');
  document.body.style.overflow = 'hidden';

  const list = document.getElementById('notif-list');
  list.innerHTML = `<div class="inline-loader"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>`;

  const { data } = await getNotifications();
  list.innerHTML = '';

  if (!data?.length) {
    list.innerHTML = `<div class="empty-state" style="padding:var(--sp-10) var(--sp-4)">
      <div class="empty-state__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div class="empty-state__sub">No notifications yet</div>
    </div>`;
    return;
  }

  data.forEach(n => list.appendChild(createNotifItem(n)));
};

window.closeNotifications = function() {
  document.getElementById('notif-overlay').classList.remove('sheet-overlay--open');
  document.getElementById('notif-sheet').classList.remove('bottom-sheet--open');
  document.body.style.overflow = '';
};

window.markAllRead = async function() {
  await markAllNotificationsRead();
  document.getElementById('notif-badge').style.display = 'none';
  document.querySelectorAll('.notif-item--unread').forEach(el => el.classList.remove('notif-item--unread'));
  document.querySelectorAll('.notif-item__unread-dot').forEach(el => el.remove());
  toast('All caught up');
};

function createNotifItem(n) {
  const typeMap = {
    new_follower: { icon: followIcon(),   cls: 'notif-item__icon--follow',  text: `<strong>${n.actor?.display_name}</strong> followed you` },
    blog_like:    { icon: heartIcon(),    cls: 'notif-item__icon--like',    text: `<strong>${n.actor?.display_name}</strong> liked your post <em>${n.blogs?.title || ''}</em>` },
    blog_comment: { icon: commentIcon(),  cls: 'notif-item__icon--comment', text: `<strong>${n.actor?.display_name}</strong> commented on <em>${n.blogs?.title || ''}</em>` },
    comment_reply:{ icon: commentIcon(),  cls: 'notif-item__icon--comment', text: `<strong>${n.actor?.display_name}</strong> replied to your comment` },
    comment_like: { icon: heartIcon(),    cls: 'notif-item__icon--like',    text: `<strong>${n.actor?.display_name}</strong> liked your comment` },
  };

  const m = typeMap[n.type] || { icon: '', cls: '', text: 'You have a new notification' };
  const el = document.createElement('div');
  el.className = `notif-item${n.is_read ? '' : ' notif-item--unread'}`;

  const href = n.blogs?.slug ? `blog.html?slug=${n.blogs.slug}` : (n.actor ? `profile.html?u=${n.actor.username}` : '#');

  el.innerHTML = `
    <div class="notif-item__icon ${m.cls}">${m.icon}</div>
    <div class="notif-item__body">
      <div class="notif-item__text">${m.text}</div>
      <div class="notif-item__time">${timeAgo(n.created_at)}</div>
    </div>
    ${!n.is_read ? '<div class="notif-item__unread-dot"></div>' : ''}`;

  el.onclick = () => { closeNotifications(); navigate(href); };
  return el;
}

// Icon helpers
function heartIcon() {
  return `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}
function commentIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
}
function followIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>`;
}

// ── Skeletons ─────────────────────────────────────────────────
function showSkeletons() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    feed.insertAdjacentHTML('beforeend', `
      <div class="skeleton-card">
        ${i === 0 ? '<div class="skeleton skeleton-cover"></div>' : ''}
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:${i===0?'12':'0'}px">
          <div class="skeleton" style="width:28px;height:28px;border-radius:50%;flex-shrink:0"></div>
          <div class="skeleton skeleton-line" style="width:${90+i*20}px"></div>
        </div>
        <div class="skeleton skeleton-line skeleton-line--title" style="width:${75+i*5}%"></div>
        <div class="skeleton skeleton-line" style="width:${50+i*8}%"></div>
        ${i < 2 ? '<div class="skeleton skeleton-line skeleton-line--short" style="margin-top:4px"></div>' : ''}
      </div>`);
  }
}

function hideSkeletons() {
  document.querySelectorAll('.skeleton-card').forEach(el => el.remove());
}

// ── Empty state ───────────────────────────────────────────────
function showEmpty(title, sub) {
  document.getElementById('feed').innerHTML = '';
  const el = document.getElementById('empty-state');
  document.getElementById('empty-title').textContent = title;
  document.getElementById('empty-sub').textContent = sub;
  el.style.display = 'flex';
}

// ── Cleanup ───────────────────────────────────────────────────
window.addEventListener('pagehide', () => {
  unsubscribe(feedChannel);
  unsubscribe(notifChannel);
});

// ── Scroll-hide header (YouTube-style) ────────────────────────
(function setupScrollHide() {
  const headerGroup = document.getElementById('header-group');
  const bottomNav   = document.querySelector('.bottom-nav');
  const page        = document.getElementById('page');
  const HIDE_AFTER  = 80;   // px scrolled before hiding kicks in
  const SHOW_DELTA  = 24;   // px scrolled up to re-show

  let lastY   = 0;
  let ticking = false;

  // Measure actual header height and keep page padding in sync
  function syncPadding(hidden) {
    if (hidden) {
      page.style.paddingTop = '0px';
    } else {
      const h = headerGroup.getBoundingClientRect().height;
      page.style.paddingTop = h + 'px';
    }
  }

  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const y = window.scrollY;
      if (y > HIDE_AFTER) {
        if (y > lastY) {
          // scrolling DOWN — hide
          headerGroup.classList.add('header-group--hidden');
          if (bottomNav) bottomNav.classList.add('bottom-nav--hidden');
          document.body.classList.add('header-hidden');
          syncPadding(true);
        } else if (lastY - y > SHOW_DELTA) {
          // scrolling UP — reveal
          headerGroup.classList.remove('header-group--hidden');
          if (bottomNav) bottomNav.classList.remove('bottom-nav--hidden');
          document.body.classList.remove('header-hidden');
          syncPadding(false);
        }
      } else {
        // near top — always show
        headerGroup.classList.remove('header-group--hidden');
        if (bottomNav) bottomNav.classList.remove('bottom-nav--hidden');
        document.body.classList.remove('header-hidden');
        syncPadding(false);
      }
      lastY = y;
      ticking = false;
    });
  }, { passive: true });

  // Set initial padding once DOM is ready
  requestAnimationFrame(() => syncPadding(false));
})();

// ── Trending button handler ────────────────────────────────────
window.goTrending = function() {
  // Switch to For You tab and reset to "All" tags
  if (currentFeed !== 'foryou') switchFeed('foryou');
  const allBtn = document.querySelector('.tag-strip .tag[data-tag=""]');
  if (allBtn) filterByTag(allBtn, '');
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

init();
